    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-radius: 24px;
    padding: 24px 28px 32px;
    box-shadow: 0 8px 32px rgba(255, 143, 179, 0.18);
  }
  .lang-switcher {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .lang-pill {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 34px 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    background: #FFFFFF;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg width='12' height='12' viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4l4 4 4-4' stroke='%23FF8FB3' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }
  .lang-pill:hover { border-color: var(--primary-dark); background: var(--note-bg); }
  .lang-pill .globe { font-size: 14px; line-height: 1; }
  .lang-pill select {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    border: none;
    background: transparent;
    appearance: none;
    font: inherit;
  }
  [dir="rtl"] .lang-pill {
    padding: 8px 12px 8px 34px;
    background-position: left 12px center;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 8px;
    letter-spacing: -0.2px;
  }
  p.desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.65;
    margin: 0 0 24px;
  }
  .field { margin-bottom: 20px; }
  .label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .radio-group {
    display: flex;
    gap: 8px;
  }
  .radio-option { flex: 1; }
  .radio-option input { display: none; }
  .radio-option label {
    display: block;
    text-align: center;
    padding: 14px 8px;
    border: 2px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s ease;
    background: #FFFFFF;
  }
  .radio-option input:checked + label {
    border-color: var(--primary-dark);
    background: var(--primary);
    color: #FFFFFF;
  }
  input[type="email"] {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 16px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s ease;
    background: #FFFFFF;
    color: var(--text);
  }
  input[type="email"]:focus {
    border-color: var(--primary-dark);
  }
  button {
    width: 100%;
    padding: 16px;
    background: var(--primary-dark);
    color: #FFFFFF;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
    margin-top: 4px;
  }
  button:hover:not(:disabled) { background: var(--primary-hover); }
  button:disabled {
    background: #D9D9D9;
    cursor: not-allowed;
  }
  .note {
    margin-top: 18px;
    padding: 12px 14px;
    background: var(--note-bg);
    border-radius: 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
  }
  .footer a {
    color: var(--primary-dark);
    text-decoration: none;
  }
  .success {
    text-align: center;
    padding: 32px 12px 12px;
  }
  .success .emoji { font-size: 40px; }
  .success h2 { font-size: 18px; margin: 12px 0 8px; }
  .success p { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin: 0; }
</style>

      subjectSave: "[طلب حذف] gumi save",
      subjectGlowup: "[طلب حذف] gumi glowup",
      contact: "للتواصل:",
      successTitle: "تم استلام طلبك",
      successDesc1: "سنعالج طلبك خلال 7 أيام عمل",
      successDesc2: "وسنخبرك عبر البريد الإلكتروني عند الانتهاء.",
      error: "فشل الإرسال. يرجى إرسال بريد إلكتروني مباشرة إلى kawkaw.app@gmail.com."
    }
  };

  const SUPPORTED = ['ko', 'en', 'tl', 'ceb', 'zh', 'ja', 'es', 'fr', 'vi', 'th', 'ar'];
  const RTL_LANGS = ['ar'];
  const LANG_NAMES = {
    ko: '한국어', en: 'English', tl: 'Tagalog', ceb: 'Bisaya',
    zh: '中文', ja: '日本語', es: 'Español', fr: 'Français',
    vi: 'Tiếng Việt', th: 'ไทย', ar: 'العربية'
  };

  function detectLang() {
    const saved = localStorage.getItem('lang');
    if (saved && i18n[saved]) return saved;
    const candidates = navigator.languages && navigator.languages.length
      ? navigator.languages
      : [navigator.language || 'en'];
    for (const raw of candidates) {
      const low = (raw || '').toLowerCase();
      if (low.startsWith('ko')) return 'ko';
      if (low.startsWith('ceb')) return 'ceb';
      if (low.startsWith('tl') || low.startsWith('fil')) return 'tl';
      if (low.startsWith('zh')) return 'zh';
      if (low.startsWith('ja')) return 'ja';
      if (low.startsWith('es')) return 'es';
      if (low.startsWith('fr')) return 'fr';
      if (low.startsWith('vi')) return 'vi';
      if (low.startsWith('th')) return 'th';
      if (low.startsWith('ar')) return 'ar';
      if (low.startsWith('en')) return 'en';
    }
    return 'en';
  }

  const gumiSave = document.getElementById('gumi-save');
  const gumiGlowup = document.getElementById('gumi-glowup');
  const emailLabel = document.getElementById('email-label');
  const emailNote = document.getElementById('email-note');
  const emailSubject = document.getElementById('email-subject');
  const form = document.getElementById('form');
  const card = document.getElementById('card');
  const langSelect = document.getElementById('lang-select');
  const submitBtn = document.getElementById('submit-btn');

  let currentLang = 'en';
  let t = i18n.en;

  function applyLang(lang) {
    currentLang = lang;
    t = i18n[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = RTL_LANGS.includes(lang) ? 'rtl' : 'ltr';
    document.title = t.title;
    document.getElementById('h1').textContent = t.h1;
    document.getElementById('desc-1').textContent = t.desc1;
    document.getElementById('desc-2').textContent = t.desc2;
    document.getElementById('service-label').textContent = t.serviceLabel;
    document.getElementById('contact-label').textContent = t.contact;
    document.getElementById('lang-current').textContent = LANG_NAMES[lang] || lang;
    submitBtn.textContent = t.submit;
    updateLabel();
  }

  function updateLabel() {
    if (gumiSave.checked) {
      emailLabel.textContent = t.emailLabelFb;
      emailNote.textContent = t.noteSave;
      emailSubject.value = t.subjectSave;
    } else if (gumiGlowup.checked) {
      emailLabel.textContent = t.emailLabelLogin;
      emailNote.textContent = t.noteGlowup;
      emailSubject.value = t.subjectGlowup;
    } else {
      emailLabel.textContent = t.emailLabelDefault;
      emailNote.textContent = t.noteInitial;
      emailSubject.value = t.subjectDefault;
    }
  }

  gumiSave.addEventListener('change', updateLabel);
  gumiGlowup.addEventListener('change', updateLabel);

  langSelect.addEventListener('change', (e) => {
    const lang = e.target.value;
    localStorage.setItem('lang', lang);
    applyLang(lang);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = t.sending;

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) throw new Error('network');
      card.innerHTML = `<div class="success"><div class="emoji">✉️</div><h2>${t.successTitle}</h2><p>${t.successDesc1}<br>${t.successDesc2}</p></div>`;
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = t.submit;
      alert(t.error);
    }
  });

  const initialLang = detectLang();
  langSelect.value = initialLang;
  applyLang(initialLang);
</script>
</body>
</html>
