<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>App User Guide | Dashboard · Envelope · Dream · Report</title>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#0f1733;
        --card:#121c3d;
        --text:#e9eeff;
        --muted:#a9b4de;
        --accent:#8b5cf6;
        --accent2:#22c55e;
        --border: rgba(255,255,255,0.10);
        --shadow: 0 14px 40px rgba(0,0,0,0.35);
        --radius: 18px;
        --max: 1040px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }

      *{ box-sizing:border-box; }
      body{
        margin:0;
        font-family: var(--sans);
        color:var(--text);
        background:
          radial-gradient(1200px 600px at 15% -10%, rgba(139,92,246,0.35), transparent 55%),
          radial-gradient(1000px 520px at 110% 10%, rgba(34,197,94,0.22), transparent 60%),
          linear-gradient(180deg, var(--bg), #070a14 60%);
        line-height:1.6;
      }

      a{ color:inherit; text-decoration:none; }
      .wrap{ max-width:var(--max); margin:0 auto; padding:28px 18px 70px; }

      /* ── Language Switcher ── */
      .lang-bar{
        display:flex;
        justify-content:flex-end;
        gap:8px;
        margin-bottom:14px;
      }
      .lang-btn{
        cursor:pointer;
        padding:6px 16px;
        border-radius:999px;
        border:1px solid var(--border);
        background:rgba(18,28,61,0.55);
        color:var(--muted);
        font-size:13px;
        font-weight:600;
        transition:all 0.2s;
        letter-spacing:0.3px;
      }
      .lang-btn:hover{
        border-color:rgba(139,92,246,0.6);
        color:var(--text);
      }
      .lang-btn.active{
        background:rgba(139,92,246,0.25);
        border-color:rgba(139,92,246,0.8);
        color:#c4b5fd;
      }

      header.hero{
        display:grid;
        gap:14px;
        padding:26px 20px;
        border:1px solid var(--border);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
        box-shadow: var(--shadow);
      }
      .hero h1{ margin:0; font-size: 24px; letter-spacing:-0.3px; }
      .hero p{ margin:0; color:var(--muted); }
      .pillrow{
        display:flex; flex-wrap:wrap; gap:10px; margin-top: 6px;
      }
      .pill{
        display:inline-flex; align-items:center; gap:8px;
        padding:8px 12px;
        border:1px solid var(--border);
        background: rgba(18,28,61,0.55);
        border-radius: 999px;
        color: var(--muted);
        font-size: 13px;
      }
      .pill b{ color:var(--text); font-weight:700; }
      .pill kbd{
        font-family: var(--mono);
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.18);
        border-radius: 999px;
        color: var(--text);
      }

      nav.toc{
        position: sticky;
        top: 0;
        z-index: 10;
        margin-top: 14px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(11,16,32,0.75);
        backdrop-filter: blur(10px);
      }
      .toc .row{
        display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;
      }
      .toc .links{ display:flex; flex-wrap:wrap; gap:10px; }
      .toc a{
        padding: 8px 12px;
        border:1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(18,28,61,0.38);
        font-size: 13px;
      }
      .toc a:hover{ border-color: rgba(139,92,246,0.55); color: var(--text); }
      .toc .tools{ display:flex; gap:10px; align-items:center; }
      button{
        cursor:pointer;
        border: 1px solid var(--border);
        background: rgba(18,28,61,0.38);
        color: var(--text);
        border-radius: 12px;
        padding: 8px 12px;
        font-size: 13px;
      }
      button:hover{ border-color: rgba(34,197,94,0.55); }

      section{
        margin-top: 18px;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255,255,255,0.03);
        box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      }

      .section-head{
        display:flex; flex-wrap:wrap; gap:10px;
        align-items:flex-end; justify-content:space-between;
        margin-bottom: 10px;
      }
      h2{
        margin:0;
        font-size: 18px;
        letter-spacing:-0.2px;
      }
      .sub{
        color: var(--muted);
        font-size: 13px;
        margin:0;
      }

      .grid{
        display:grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 14px;
        align-items:start;
      }
      @media (max-width: 920px){
        .grid{ grid-template-columns: 1fr; }
        nav.toc{ position: static; }
      }

      .card{
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(18,28,61,0.45);
        padding: 14px;
      }

      .steps{
        margin:0;
        padding-left: 18px;
      }
      .steps li{ margin: 8px 0; }
      .steps li b{ color: var(--text); }
      .hint{
        margin-top: 10px;
        padding: 10px 12px;
        border-left: 3px solid rgba(139,92,246,0.75);
        background: rgba(139,92,246,0.10);
        border-radius: 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .warn{
        margin-top: 10px;
        padding: 10px 12px;
        border-left: 3px solid rgba(245,158,11,0.85);
        background: rgba(245,158,11,0.10);
        border-radius: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .shot{
        display:grid;
        gap:10px;
      }
      figure{
        margin:0;
        border: 1px dashed rgba(255,255,255,0.18);
        border-radius: 16px;
        padding: 12px;
        background: rgba(0,0,0,0.10);
      }
      figure .ph{
        width:100%;
        aspect-ratio: 9 / 16;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.10);
        background:
          linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
          repeating-linear-gradient(45deg, rgba(255,255,255,0.06), rgba(255,255,255,0.06) 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
        display:flex;
        align-items:center;
        justify-content:center;
        text-align:center;
        color: rgba(233,238,255,0.75);
        font-size: 13px;
        padding: 16px;
      }
      figure img{
        width:100%;
        border-radius: 12px;
        display:none;
        border: 1px solid rgba(255,255,255,0.10);
      }
      figcaption{
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .faq details{
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 12px;
        background: rgba(18,28,61,0.35);
      }
      .faq details + details{ margin-top: 10px; }
      .faq summary{ cursor:pointer; color: var(--text); font-weight: 700; }
      .faq p{ margin: 8px 0 0; color: var(--muted); font-size: 13px; }

      footer{
        margin-top: 18px;
        padding: 16px 18px;
        color: var(--muted);
        font-size: 12px;
        border-top: 1px solid var(--border);
      }

      .tag{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.03);
        color: var(--muted);
        font-size: 12px;
      }
      .tag .dot{
        width:8px; height:8px; border-radius: 999px;
        background: rgba(139,92,246,0.9);
        box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
      }
    </style>
  </head>

      // ─────────────────────────────────────────────
      //  Language Switcher
      // ─────────────────────────────────────────────
      let currentLang = 'en';

      function applyLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (t[key] !== undefined) el.textContent = t[key];
        });
        document.documentElement.lang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });
      }

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => applyLang(btn.getAttribute('data-lang')));
      });

      // Init with English
      applyLang('en');

      // ─────────────────────────────────────────────
      //  Smooth scroll
      // ─────────────────────────────────────────────
      document.querySelectorAll('a[href^="#"]').forEach((a) => {
        a.addEventListener('click', (e) => {
          const id = a.getAttribute('href');
          const el = document.querySelector(id);
          if (!el) return;
          e.preventDefault();
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.pushState(null, '', id);
        });
      });

      // Print / Back to Top
      document.getElementById('btnPrint')?.addEventListener('click', () => window.print());
      document.getElementById('btnTop')?.addEventListener('click', () => {
        document.getElementById('top')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // Auto-image loader
      document.querySelectorAll('img[data-auto]').forEach((img) => {
        const figure = img.closest('figure');
        const fallback = figure?.querySelector('[data-fallback]');
        img.addEventListener('load', () => {
          img.style.display = 'block';
          if (fallback) fallback.style.display = 'none';
        });
        img.addEventListener('error', () => {
          img.style.display = 'none';
          if (fallback) fallback.style.display = 'flex';
        });
      });
    </script>
